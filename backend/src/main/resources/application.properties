spring.application.name=fl-backend

# PostgreSQL datasource (Railway-style placeholders)
spring.datasource.url=jdbc:postgresql://${PGHOST:${POSTGRES_HOST:localhost}}:${PGPORT:${POSTGRES_PORT:5432}}/${PGDATABASE:${POSTGRES_DB:fl_backend}}
spring.datasource.username=${PGUSER:${POSTGRES_USER:postgres}}
spring.datasource.password=${PGPASSWORD:${POSTGRES_PASSWORD:password}}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Web server
server.port=8080

# Placeholder JWT configuration (values to be set per environment)
app.security.jwt.secret=${JWT_SECRET:change-me}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

